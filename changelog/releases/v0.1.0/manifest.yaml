created: 2026-03-02
title: Inaugural Pi package for Tenzir users
intro: >-
  This inaugural release introduces the `pi-tenzir` package so Tenzir users can install
  Tenzir workflows in Pi with one command. After installation, `/skill:tenzir` activates
  the Tenzir skill, and Pi automatically fetches and registers the latest skill version
  on first use.
